<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="200" fill="#000000"/>

  <!-- Grid -->
  <g stroke="#ec4899" stroke-width="0.6" opacity="0.12">
    <!-- Vertical -->
    <g>
      <line x1="0" y1="0" x2="0" y2="200"/>
      <line x1="40" y1="0" x2="40" y2="200"/>
      <line x1="80" y1="0" x2="80" y2="200"/>
      <line x1="120" y1="0" x2="120" y2="200"/>
      <line x1="160" y1="0" x2="160" y2="200"/>
      <line x1="200" y1="0" x2="200" y2="200"/>
      <line x1="240" y1="0" x2="240" y2="200"/>
      <line x1="280" y1="0" x2="280" y2="200"/>
      <line x1="320" y1="0" x2="320" y2="200"/>
      <line x1="360" y1="0" x2="360" y2="200"/>
      <line x1="400" y1="0" x2="400" y2="200"/>
      <line x1="440" y1="0" x2="440" y2="200"/>
      <line x1="480" y1="0" x2="480" y2="200"/>
      <line x1="520" y1="0" x2="520" y2="200"/>
      <line x1="560" y1="0" x2="560" y2="200"/>
      <line x1="600" y1="0" x2="600" y2="200"/>
      <line x1="640" y1="0" x2="640" y2="200"/>
      <line x1="680" y1="0" x2="680" y2="200"/>
      <line x1="720" y1="0" x2="720" y2="200"/>
      <line x1="760" y1="0" x2="760" y2="200"/>
    </g>

    <!-- Horizontal -->
    <g>
      <line x1="0" y1="0" x2="800" y2="0"/>
      <line x1="0" y1="40" x2="800" y2="40"/>
      <line x1="0" y1="80" x2="800" y2="80"/>
      <line x1="0" y1="120" x2="800" y2="120"/>
      <line x1="0" y1="160" x2="800" y2="160"/>
      <line x1="0" y1="200" x2="800" y2="200"/>
    </g>
  </g>

  <!-- MAIN STAR (focus) -->
  <g stroke="#ec4899" stroke-width="1.4" fill="#ec4899" opacity="0.5">
    <circle cx="600" cy="100" r="4"/>
    <circle cx="600" cy="40" r="3"/>
    <circle cx="660" cy="70" r="3"/>
    <circle cx="660" cy="130" r="3"/>
    <circle cx="600" cy="160" r="3"/>
    <circle cx="540" cy="130" r="3"/>
    <circle cx="540" cy="70" r="3"/>

    <line x1="600" y1="100" x2="600" y2="40"/>
    <line x1="600" y1="100" x2="660" y2="70"/>
    <line x1="600" y1="100" x2="660" y2="130"/>
    <line x1="600" y1="100" x2="600" y2="160"/>
    <line x1="600" y1="100" x2="540" y2="130"/>
    <line x1="600" y1="100" x2="540" y2="70"/>
  </g>

  <!-- FADED STAR 1 -->
  <g stroke="#ec4899" stroke-width="1" fill="#ec4899" opacity="0.15">
    <circle cx="200" cy="60" r="3"/>
    <circle cx="200" cy="20" r="2"/>
    <circle cx="240" cy="50" r="2"/>
    <circle cx="160" cy="50" r="2"/>

    <line x1="200" y1="60" x2="200" y2="20"/>
    <line x1="200" y1="60" x2="240" y2="50"/>
    <line x1="200" y1="60" x2="160" y2="50"/>
  </g>

  <!-- FADED STAR 2 -->
  <g stroke="#ec4899" stroke-width="1" fill="#ec4899" opacity="0.12">
    <circle cx="350" cy="150" r="3"/>
    <circle cx="350" cy="120" r="2"/>
    <circle cx="380" cy="160" r="2"/>
    <circle cx="320" cy="160" r="2"/>

    <line x1="350" y1="150" x2="350" y2="120"/>
    <line x1="350" y1="150" x2="380" y2="160"/>
    <line x1="350" y1="150" x2="320" y2="160"/>
  </g>

  <!-- FADED STAR 3 -->
  <g stroke="#ec4899" stroke-width="1" fill="#ec4899" opacity="0.1">
    <circle cx="700" cy="40" r="3"/>
    <circle cx="700" cy="10" r="2"/>
    <circle cx="730" cy="30" r="2"/>
    <circle cx="670" cy="30" r="2"/>

    <line x1="700" y1="40" x2="700" y2="10"/>
    <line x1="700" y1="40" x2="730" y2="30"/>
    <line x1="700" y1="40" x2="670" y2="30"/>
  </g>

  <!-- Name -->
  <text x="40" y="110"
        font-family="monospace"
        font-size="34"
        fill="#ec4899"
        letter-spacing="4"
        font-weight="700">
    NAZMIN
  </text>

  <!-- Subtitle -->
  <text x="40" y="145"
        font-family="Courier New, monospace"
        font-size="16"
        fill="#f472b6">
    backend developer | web security
  </text>

</svg>
